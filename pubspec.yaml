name: mesquita_quelimane
description: "Aplicativo oficial MosqueNow com horários de oração, notificações, Qibla, Zakat e recursos islâmicos."
publish_to: 'none'

version: 1.0.2+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  

  # Firebase
  firebase_core: ^3.8.0
  firebase_database: ^11.0.0
  firebase_messaging: ^15.0.0
  firebase_auth: ^5.1.0

  # Notifications
  flutter_local_notifications: ^20.1.0
  overlay_support: ^2.1.0
  permission_handler: ^11.3.1
  android_intent_plus: ^5.1.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^9.0.0
  url_launcher: ^6.2.5


  # Location
  geolocator: ^14.0.2
  timezone: ^0.10.0

  # Islamic prayer times
  adhan: ^2.0.0
  
  # Qibla
  flutter_qiblah: ^3.0.0
  flutter_svg: ^2.0.10
  sensors_plus: ^4.0.2

  # Utilities
  http: ^1.1.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  just_audio: ^0.9.36
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0B3D2E"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon.png

